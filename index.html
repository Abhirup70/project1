<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Converter - API Client</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }

        .input-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .input-row input,
        .input-row select {
            width: 100%;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .result {
            margin-top: 30px;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 8px;
            display: none;
        }

        .result.show {
            display: block;
        }

        .result-title {
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
        }

        .conversion-display {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
            margin: 15px 0;
            text-align: center;
        }

        .result-detail {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #ddd;
            font-size: 14px;
            color: #666;
        }

        .result-detail:last-child {
            border-bottom: none;
        }

        .error {
            background: #ffebee;
            border-left: 4px solid #f44336;
            padding: 15px;
            border-radius: 4px;
            color: #c62828;
            margin-top: 20px;
            display: none;
        }

        .error.show {
            display: block;
        }

        .status {
            font-size: 12px;
            color: #999;
            text-align: center;
            margin-top: 20px;
        }

        .loading {
            display: none;
            text-align: center;
            color: #667eea;
            font-size: 14px;
        }

        .loading.show {
            display: block;
        }

        .swap-btn {
            background: #f0f0f0;
            color: #667eea;
            width: auto;
            padding: 8px 15px;
            margin-top: 0;
            margin-left: 5px;
            font-size: 14px;
        }

        .swap-btn:hover {
            background: #e0e0e0;
            transform: none;
            box-shadow: none;
        }

        .currency-row {
            display: grid;
            grid-template-columns: 1fr 1fr auto;
            gap: 10px;
            align-items: flex-end;
        }

        .api-status {
            padding: 10px;
            border-radius: 4px;
            font-size: 12px;
            margin-top: 15px;
            text-align: center;
        }

        .api-status.connected {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .api-status.disconnected {
            background: #ffebee;
            color: #c62828;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💱 Currency Converter</h1>
        <p class="subtitle">Convert money using live exchange rates</p>

        <form id="converterForm">
            <!-- Amount Input -->
            <div class="form-group">
                <label for="amount">Amount</label>
                <input 
                    type="number" 
                    id="amount" 
                    placeholder="Enter amount" 
                    value="100" 
                    step="0.01"
                    min="0.01"
                    required
                >
            </div>

            <!-- Currency Selection -->
            <div class="form-group">
                <label>From / To</label>
                <div class="currency-row">
                    <select id="fromCurrency" required>
                        <option value="">Select currency</option>
                    </select>
                    <select id="toCurrency" required>
                        <option value="">Select currency</option>
                    </select>
                    <button type="button" class="swap-btn" id="swapBtn">⇄</button>
                </div>
            </div>

            <button type="submit">Convert</button>
        </form>

        <div class="loading" id="loading">Converting...</div>

        <!-- Result -->
        <div class="result" id="result">
            <div class="result-title">Conversion Result</div>
            <div class="conversion-display" id="conversionDisplay"></div>
            <div class="result-detail">
                <span>Exchange Rate:</span>
                <span id="exchangeRate"></span>
            </div>
            <div class="result-detail">
                <span>Updated:</span>
                <span id="timestamp"></span>
            </div>
        </div>

        <!-- Error -->
        <div class="error" id="error"></div>

        <!-- API Status -->
        <div class="api-status disconnected" id="apiStatus">Checking API...</div>

        <div class="status">
            Made with ❤️ using FastAPI
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:8000';
        const currencies = [];

        // Initialize
        document.addEventListener('DOMContentLoaded', async () => {
            await loadCurrencies();
            checkApiStatus();
            setupEventListeners();
        });

        // Load supported currencies
        async function loadCurrencies() {
            try {
                const response = await fetch(`${API_BASE_URL}/currencies`);
                const data = await response.json();
                
                const currencyList = data.currencies || [];
                currencies.push(...currencyList);

                // Populate dropdowns
                const fromSelect = document.getElementById('fromCurrency');
                const toSelect = document.getElementById('toCurrency');

                currencyList.forEach(currency => {
                    const option1 = document.createElement('option');
                    option1.value = currency;
                    option1.textContent = currency;
                    fromSelect.appendChild(option1);

                    const option2 = document.createElement('option');
                    option2.value = currency;
                    option2.textContent = currency;
                    toSelect.appendChild(option2);
                });

                // Set default values
                fromSelect.value = 'USD';
                toSelect.value = 'EUR';
            } catch (error) {
                console.error('Failed to load currencies:', error);
            }
        }

        // Check API status
        async function checkApiStatus() {
            try {
                const response = await fetch(`${API_BASE_URL}/health`);
                if (response.ok) {
                    document.getElementById('apiStatus').textContent = '✓ API Connected';
                    document.getElementById('apiStatus').classList.remove('disconnected');
                    document.getElementById('apiStatus').classList.add('connected');
                }
            } catch (error) {
                document.getElementById('apiStatus').textContent = '✗ API Disconnected';
                document.getElementById('apiStatus').classList.add('disconnected');
            }
        }

        // Setup event listeners
        function setupEventListeners() {
            document.getElementById('converterForm').addEventListener('submit', handleConvert);
            document.getElementById('swapBtn').addEventListener('click', swapCurrencies);
        }

        // Handle conversion
        async function handleConvert(e) {
            e.preventDefault();

            const amount = document.getElementById('amount').value;
            const fromCurrency = document.getElementById('fromCurrency').value;
            const toCurrency = document.getElementById('toCurrency').value;

            if (!amount || !fromCurrency || !toCurrency) {
                showError('Please fill in all fields');
                return;
            }

            if (fromCurrency === toCurrency) {
                showError('Please select different currencies');
                return;
            }

            document.getElementById('loading').classList.add('show');
            document.getElementById('result').classList.remove('show');
            document.getElementById('error').classList.remove('show');

            try {
                const response = await fetch(
                    `${API_BASE_URL}/convert?from_currency=${fromCurrency}&to_currency=${toCurrency}&amount=${amount}`
                );

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.detail || 'Conversion failed');
                }

                const data = await response.json();
                displayResult(data);
                document.getElementById('error').classList.remove('show');
            } catch (error) {
                showError(error.message || 'Conversion failed. Please try again.');
                document.getElementById('result').classList.remove('show');
            } finally {
                document.getElementById('loading').classList.remove('show');
            }
        }

        // Display result
        function displayResult(data) {
            document.getElementById('conversionDisplay').innerHTML = 
                `${data.amount} ${data.from_currency} = <strong>${data.converted_amount} ${data.to_currency}</strong>`;
            
            document.getElementById('exchangeRate').textContent = 
                `1 ${data.from_currency} = ${data.exchange_rate.toFixed(4)} ${data.to_currency}`;
            
            const date = new Date(data.timestamp);
            document.getElementById('timestamp').textContent = date.toLocaleString();

            document.getElementById('result').classList.add('show');
        }

        // Show error
        function showError(message) {
            document.getElementById('error').textContent = '❌ ' + message;
            document.getElementById('error').classList.add('show');
        }

        // Swap currencies
        function swapCurrencies(e) {
            e.preventDefault();
            const from = document.getElementById('fromCurrency');
            const to = document.getElementById('toCurrency');
            const temp = from.value;
            from.value = to.value;
            to.value = temp;
        }
    </script>
</body>
</html>
